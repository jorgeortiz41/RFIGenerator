project:
  name: RFIGen
  version: "0.1.0"
  description: Base configuration for synthetic K-band radiometric data generation.

run:
  seed: 12345
  n_datasets: 5
  n_records_per_dataset: 1000

radiometry:
  use_rttov: false
  base_level1_path: data/profiles/datos_radiometro/2023-04-01_00-04-09_lv1.csv
  noise_std_k: 0.5

  # baseline_type: atmospheric_brightness
  # mean_tb_k: 180.0
  # variability_tb_k: 4.5
  # instrument_noise_std_k: 0.35
  # drift_per_second_k: 0.05
  # atmosphere:
  #   water_vapor_profile: standard
  #   cloud_liquid_water_mm: 0.10
  #   air_mass_factor: 1.0

rfi_sources:
  - id: rfi_nb_001
    type: narrowband
    enabled: true
    center_offset_mhz: 12.0
    bandwidth_mhz: 2.0
    power_dbm: -72.0
    persistence: 1.0
    modulation: none

  - id: rfi_pulse_001
    type: pulsed
    enabled: true
    center_offset_mhz: -25.0
    bandwidth_mhz: 6.0
    power_dbm: -65.0
    duty_cycle: 0.15
    pulse_period_ms: 8.0
    persistence: 0.7
    modulation: none

  - id: rfi_bursty_001
    type: bursty
    enabled: false
    center_offset_mhz: 35.0
    bandwidth_mhz: 10.0
    power_dbm: -68.0
    burst_rate_hz: 25.0
    burst_duration_ms: 3.0
    persistence: 0.4
    modulation: amplitude

composition:
  inject_rfi: true

export:
  save_clean: true
  save_contaminated: true
  save_metadata: true
  directory: outputs/
  formats:
    csv: true
    xlsx: false
  filenames:
    clean: clean_kband_demo
    contaminated: contaminated_kband_demo
    metadata: metadata_demo

# visualization:
#   enabled: true
#   save_figures: true
#   figure_directory: outputs/figures/
#   products:
#     time_domain: true
#     frequency_spectrum: true
#     spectrogram: true

interfaces:
  cli:
    enabled: true
    allow_parameter_overrides: true
  gui:
    enabled: false
